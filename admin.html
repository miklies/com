<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Miklies</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: var(--paper); }
    nav { background: rgba(248,248,246,0.95); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border: 1px solid var(--rule);
      padding: 40px; width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto; margin: 24px;
    }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 32px;
    }
    .modal-header h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 400; }
    .modal-close {
      background: none; border: none; font-size: 1.4rem;
      color: var(--mid); cursor: pointer; line-height: 1; padding: 4px;
    }
    .modal-close:hover { color: var(--ink); }

    .admin-empty { padding: 48px 24px; text-align: center; background: var(--white); border: 1px solid var(--rule); }
    .admin-empty p { font-size: 0.82rem; color: var(--mid); }

    .config-notice {
      background: #fffbe6; border: 1px solid #f0e06a;
      padding: 16px 20px; margin-bottom: 32px;
      font-size: 0.8rem; color: #7a6900; line-height: 1.6;
    }
    .config-notice code { background: rgba(0,0,0,0.06); padding: 1px 5px; font-family: monospace; }

    .sort-handle { cursor: grab; color: var(--light); font-size: 1.1rem; padding: 4px 8px; user-select: none; }
    .sort-handle:hover { color: var(--mid); }
    .admin-project-row { cursor: default; }
    .admin-project-row.dragging { opacity: 0.4; }

    /* Multi-image upload */
    .images-upload-area { display: flex; flex-direction: column; gap: 12px; }

    .upload-zone {
      border: 1px dashed var(--rule); padding: 28px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--ink); background: var(--paper); }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-zone p { font-size: 0.78rem; color: var(--mid); }
    .upload-zone .upload-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--light); margin-top: 6px; display: block; }

    .image-previews {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 12px;
    }
    .preview-item {
      position: relative; aspect-ratio: 1; background: var(--paper); border: 1px solid var(--rule); overflow: hidden;
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-item .remove-img {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,0.6); color: white; border: none;
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      font-size: 0.7rem; line-height: 20px; text-align: center; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-item .img-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase;
      text-align: center; padding: 3px;
    }
    .preview-item.cover-img { outline: 2px solid var(--ink); outline-offset: -2px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Miklies</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="work.html">Work</a></li>
    </ul>
  </nav>

  <main style="padding-top: 64px;">
    <div class="admin-wrap">
      <div class="admin-header">
        <h1>Projects</h1>
        <button class="btn btn-primary" id="btn-add">+ Add project</button>
      </div>

      <div class="config-notice" id="config-notice">
        <strong>Setup needed:</strong> Open <code>supabase-config.js</code> and fill in your
        <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code>.
      </div>

      <div class="admin-list" id="admin-list">
        <div class="admin-empty"><p>Loading…</p></div>
      </div>
    </div>
  </main>

  <!-- Add / Edit modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add project</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="field-title" placeholder="Project name">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="field-category">
            <option value="">— select —</option>
            <option value="Brand">Brand</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Typography">Typography</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="field-year" placeholder="2025" min="2000" max="2099">
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="field-desc" placeholder="Project description…"></textarea>
      </div>

      <div class="form-group">
        <label>Project link</label>
        <input type="url" id="field-link" placeholder="https://…">
      </div>

      <!-- Multi-image upload -->
      <div class="form-group">
        <label>Images <span style="color:var(--light); font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; margin-left:8px;">Max 5 — first image = cover</span></label>
        <div class="images-upload-area">
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="field-images" accept="image/*" multiple>
            <p>Drop images here or click to upload</p>
            <span class="upload-label">JPG, PNG, WEBP — max 5 MB each</span>
          </div>
          <div class="image-previews" id="image-previews"></div>
        </div>
      </div>

      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:32px;">
        <button class="btn btn-outline" id="btn-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-save">Save project</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="supabase-config.js"></script>
  <script src="nav.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    if (!SUPABASE_URL.includes('YOUR_')) {
      document.getElementById('config-notice').style.display = 'none';
    }

    let projects = [];
    let editingId = null;
    // imageSlots: array of { file: File|null, existingPath: string|null, previewUrl: string }
    let imageSlots = [];

    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const btnAdd = document.getElementById('btn-add');
    const btnSave = document.getElementById('btn-save');
    const btnCancel = document.getElementById('btn-cancel');
    const modalClose = document.getElementById('modal-close');
    const fieldTitle = document.getElementById('field-title');
    const fieldCat = document.getElementById('field-category');
    const fieldYear = document.getElementById('field-year');
    const fieldDesc = document.getElementById('field-desc');
    const fieldLink = document.getElementById('field-link');
    const fieldImages = document.getElementById('field-images');
    const imagePreviews = document.getElementById('image-previews');
    const uploadZone = document.getElementById('upload-zone');
    const toast = document.getElementById('toast');
    const adminList = document.getElementById('admin-list');

    function showToast(msg, duration = 2800) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function getImageUrl(path) {
      if (!path) return null;
      if (path.startsWith('http')) return path;
      const { data } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      return data?.publicUrl || null;
    }

    // ── Render image previews
    function renderPreviews() {
      if (!imageSlots.length) { imagePreviews.innerHTML = ''; return; }
      imagePreviews.innerHTML = imageSlots.map((slot, i) => `
        <div class="preview-item ${i === 0 ? 'cover-img' : ''}" data-index="${i}">
          <img src="${slot.previewUrl}" alt="">
          <button class="remove-img" data-index="${i}" title="Remove">×</button>
          <span class="img-label">${i === 0 ? 'Cover' : i + 1}</span>
        </div>
      `).join('');

      imagePreviews.querySelectorAll('.remove-img').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.index);
          imageSlots.splice(idx, 1);
          renderPreviews();
        });
      });
    }

    // ── File input handler
    fieldImages.addEventListener('change', () => {
      const files = [...fieldImages.files];
      const remaining = 5 - imageSlots.length;
      const toAdd = files.slice(0, remaining);

      if (files.length > remaining) {
        showToast(`최대 5장까지 업로드할 수 있어요. ${files.length - remaining}장은 제외됐어요.`);
      }

      toAdd.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          imageSlots.push({ file, existingPath: null, previewUrl: e.target.result });
          renderPreviews();
        };
        reader.readAsDataURL(file);
      });
      fieldImages.value = '';
    });

    // Drag-over style
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); });

    // ── Load projects
    async function loadProjects() {
      try {
        const { data, error } = await db.from('projects').select('*').order('sort_order', { ascending: true });
        if (error) throw error;
        projects = data || [];
        renderList();
      } catch (err) {
        adminList.innerHTML = `<div class="admin-empty"><p>Could not connect to Supabase.</p></div>`;
        console.error(err);
      }
    }

    function renderList() {
      if (!projects.length) {
        adminList.innerHTML = `<div class="admin-empty"><p>No projects yet. Add your first one above.</p></div>`;
        return;
      }
      adminList.innerHTML = projects.map(p => {
        const allPaths = [p.image_path, ...(p.images || [])].filter(Boolean);
        const thumbUrl = getImageUrl(allPaths[0]);
        return `
          <div class="admin-project-row" data-id="${p.id}" draggable="true">
            <span class="sort-handle" title="Drag to reorder">⠿</span>
            ${thumbUrl
              ? `<img class="admin-thumb" src="${thumbUrl}" alt="${p.title}">`
              : `<div class="admin-thumb-placeholder"><span>No img</span></div>`}
            <div class="admin-project-meta">
              <h3>${p.title}</h3>
              <p>${p.category || 'Uncategorized'}${p.year ? ' · ' + p.year : ''}${allPaths.length > 1 ? ' · ' + allPaths.length + ' images' : ''}</p>
            </div>
            <div class="admin-row-actions">
              <button class="btn btn-ghost" onclick="openEdit('${p.id}')">Edit</button>
              <button class="btn btn-danger" onclick="deleteProject('${p.id}')">Delete</button>
            </div>
          </div>`;
      }).join('');
      initDragSort();
    }

    function initDragSort() {
      let dragSrc = null;
      adminList.querySelectorAll('.admin-project-row').forEach(row => {
        row.addEventListener('dragstart', () => { dragSrc = row; row.classList.add('dragging'); });
        row.addEventListener('dragend', () => { row.classList.remove('dragging'); dragSrc = null; });
        row.addEventListener('dragover', e => e.preventDefault());
        row.addEventListener('drop', async () => {
          if (!dragSrc || dragSrc === row) return;
          const rows = [...adminList.querySelectorAll('.admin-project-row')];
          const from = rows.indexOf(dragSrc);
          const to = rows.indexOf(row);
          const reordered = [...projects];
          const [moved] = reordered.splice(from, 1);
          reordered.splice(to, 0, moved);
          projects = reordered;
          renderList();
          await Promise.all(projects.map((p, i) =>
            db.from('projects').update({ sort_order: i }).eq('id', p.id)
          ));
        });
      });
    }

    function resetModal() {
      editingId = null;
      imageSlots = [];
      fieldTitle.value = '';
      fieldCat.value = '';
      fieldYear.value = '';
      fieldDesc.value = '';
      fieldLink.value = '';
      fieldImages.value = '';
      renderPreviews();
    }

    btnAdd.addEventListener('click', () => {
      resetModal();
      modalTitle.textContent = 'Add project';
      modal.classList.add('open');
      fieldTitle.focus();
    });

    window.openEdit = (id) => {
      const p = projects.find(x => x.id === id);
      if (!p) return;
      resetModal();
      editingId = id;
      modalTitle.textContent = 'Edit project';
      fieldTitle.value = p.title || '';
      fieldCat.value = p.category || '';
      fieldYear.value = p.year || '';
      fieldDesc.value = p.description || '';
      fieldLink.value = p.link || '';

      // Load existing images into slots
      const allPaths = [p.image_path, ...(p.images || [])].filter(Boolean);
      allPaths.forEach(path => {
        const url = getImageUrl(path);
        if (url) imageSlots.push({ file: null, existingPath: path, previewUrl: url });
      });
      renderPreviews();
      modal.classList.add('open');
      fieldTitle.focus();
    };

    function closeModal() { modal.classList.remove('open'); }
    btnCancel.addEventListener('click', closeModal);
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    async function uploadImage(file) {
      const ext = file.name.split('.').pop();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { error } = await db.storage.from(STORAGE_BUCKET).upload(path, file, {
        contentType: file.type, upsert: false
      });
      if (error) throw error;
      return path;
    }

    btnSave.addEventListener('click', async () => {
      const title = fieldTitle.value.trim();
      if (!title) { fieldTitle.focus(); showToast('Title is required.'); return; }

      btnSave.textContent = 'Saving…';
      btnSave.disabled = true;

      try {
        // Upload new files, keep existing paths
        const finalPaths = [];
        for (const slot of imageSlots) {
          if (slot.file) {
            if (slot.file.size > 5 * 1024 * 1024) {
              showToast(`${slot.file.name} is over 5 MB — skipped.`);
              continue;
            }
            const path = await uploadImage(slot.file);
            finalPaths.push(path);
          } else if (slot.existingPath) {
            finalPaths.push(slot.existingPath);
          }
        }

        const coverPath = finalPaths[0] || null;
        const extraPaths = finalPaths.slice(1);

        const payload = {
          title,
          category: fieldCat.value || null,
          year: fieldYear.value ? parseInt(fieldYear.value) : null,
          description: fieldDesc.value.trim() || null,
          link: fieldLink.value.trim() || null,
          image_path: coverPath,
          images: extraPaths,
        };

        if (editingId) {
          const { error } = await db.from('projects').update(payload).eq('id', editingId);
          if (error) throw error;
          showToast('Project updated.');
        } else {
          payload.sort_order = projects.length;
          const { error } = await db.from('projects').insert(payload);
          if (error) throw error;
          showToast('Project added.');
        }

        closeModal();
        await loadProjects();
      } catch (err) {
        console.error(err);
        showToast('Error: ' + (err.message || 'Something went wrong.'));
      } finally {
        btnSave.textContent = 'Save project';
        btnSave.disabled = false;
      }
    });

    window.deleteProject = async (id) => {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      try {
        const { error } = await db.from('projects').delete().eq('id', id);
        if (error) throw error;
        showToast('Project deleted.');
        await loadProjects();
      } catch (err) {
        showToast('Error: ' + err.message);
      }
    };

    loadProjects();
  </script>
</body>
</html>
